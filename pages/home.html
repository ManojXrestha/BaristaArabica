<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabica Brew | Home</title>
    
    <!-- Google Fonts: Inter for that clean, ultra-bold Brutalist look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../images/logo.png" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#050505',      // Deep cinematic black
                            dark: '#0A0A0A',
                            accent: '#FF3E15',  // Arpeggio Signature Orange/Red
                            textGray: '#888888' // Subdued text
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        serif: ['"Georgia"', 'serif'] // For quotation marks
                    },
                    letterSpacing: {
                        tighter: '-0.04em',
                        tightest: '-0.06em'
                    }
                }
            }
        }
    </script>

    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #050505; color: #F4F4F4; -webkit-font-smoothing: antialiased; margin: 0; overflow-x: hidden; zoom: 75%; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #FF3E15; }

        /* Hide scrollbar for the horizontal galleries */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- BACKGROUND ANIMATIONS --- */
        .bg-noise {
            position: fixed;
            inset: 0; /* better than top/left/width/height */
            pointer-events: none;
            z-index: 9999; /* ensure always on top */
            opacity: 0.04;

            background-image: url("data:image/svg+xml,...");
            background-repeat: repeat;
        }

        @keyframes orbFloat1 { 
            0% { transform: translate(0, 0) scale(1); } 
            33% { transform: translate(5vw, 10vh) scale(1.1); } 
            66% { transform: translate(-5vw, 5vh) scale(0.9); } 
            100% { transform: translate(0, 0) scale(1); } 
        }
        @keyframes orbFloat2 { 
            0% { transform: translate(0, 0) scale(1); } 
            50% { transform: translate(-10vw, -10vh) scale(1.2); } 
            100% { transform: translate(0, 0) scale(1); } 
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(150px); z-index: -1; opacity: 0.3; }
        .orb-1 { width: 50vw; height: 50vw; background: #FF3E15; top: -10%; left: -10%; animation: orbFloat1 20s infinite ease-in-out; }
        .orb-2 { width: 60vw; height: 60vw; background: #8B6A47; bottom: -20%; right: -10%; animation: orbFloat2 25s infinite ease-in-out; }

        /* --- LAYOUT ANIMATIONS --- */
        .reveal-up { opacity: 0; transform: translateY(80px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-up.active { opacity: 1; transform: translateY(0); }
        .dot { display: inline-block; width: 0.15em; height: 0.15em; background-color: #FF3E15; border-radius: 50%; margin-left: 2px; }

        /* Automatic Marquee for Feedback Section */
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-50% - 12px)); }
        }
        .animate-scroll-left { animation: scroll-left 40s linear infinite; }
        .mask-edges {
            -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%);
            mask-image: linear-gradient(to right, black 80%, transparent 100%);
        }

        /* Typography Effects */
        .text-outline { -webkit-text-stroke: 1px rgba(255,255,255,0.2); color: transparent; transition: all 0.5s ease; }
        .group:hover .text-outline { -webkit-text-stroke: 1px #FF3E15; color: #FF3E15; }
        .smooth-hover { transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Add these inside the existing <style> tag in home.html */

        .mask-vertical {
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
        }

        @keyframes scroll-up {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }
        @keyframes scroll-down {
            0% { transform: translateY(-50%); }
            100% { transform: translateY(0); }
        }

        .animate-scroll-up { animation: scroll-up 35s linear infinite; }
        .animate-scroll-down { animation: scroll-down 40s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CUSTOM HOOK FOR SCROLL REVEAL ---
        const useReveal = () => {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return ref;
        };

        const Reveal = ({ children, className = "", delay = "0s" }) => {
            const ref = useReveal();
            return <div ref={ref} className={`reveal-up ${className}`} style={{ transitionDelay: delay }}>{children}</div>;
        };

        // --- COMPONENTS ---
        const Navbar = () => (
            <nav className="absolute w-full z-50 top-0 py-6 px-8 flex justify-between items-center text-white blend-difference">

                    <a href="home.html" className="hover:text-brand-accent transition-colors">Home</a>
                    <a href="course.html" className="hover:text-brand-accent transition-colors">Courses</a>
                </div>
                <div className="cursor-pointer flex items-center">
                    <img src="../images/logo.png" alt="Arabica Brew logo" className="h-32 w-auto max-h-full object-contain" />
                </div>
                <div className="flex gap-8 text-xs uppercase tracking-widest font-semibold hidden md:flex">
                    <a href="aboutus.html" className="hover:text-brand-accent transition-colors">About</a>
                    <a href="contact.html" className="hover:text-brand-accent transition-colors">Contact</a>
                </div>
            </nav>
        );

                const AnimatedVerticalGallery = () => {

                { url: "../images/3.jpg", height: "h-[250px]" },
                { url: "../images/4.jpg", height: "h-[350px]" },
                { url: "../images/5.jpg", height: "h-[280px]" }

            const col2 = [
                { url: "../images/6.jpg", height: "h-[400px]" },
                { url: "../images/7.jpg", height: "h-[250px]" },

                { url: "../images/9.jpg", height: "h-[450px]" },
                { url: "../images/10.jpg", height: "h-[300px]" }

                    {images.map((img, i) => (

                        </div>
                    ))}
                </div>
            );

            return (
                <section className="py-5 relative z-10 overflow-hidden">
                    <div className="px-8 md:px-16 max-w-[1600px] mx-auto mb-16 flex flex-col md:flex-row md:items-end justify-between gap-8">

                        <Reveal delay="0.2s">

                                <div className="w-12 h-[1px] bg-brand-textGray"></div>
                                <span>↓</span>
                            </div>
                        </Reveal>
                    </div>

                        <Reveal delay="0.3s" className="h-full">
                            <div className="flex gap-4 md:gap-6 h-full w-full justify-center">
                                
                                {/* Column 1: Scrolls Up */}
                                <div className="flex-1 overflow-hidden relative h-full">
                                    <div className="flex flex-col w-full animate-scroll-up hover:[animation-play-state:paused]" style={{ animationDuration: '35s' }}>
                                        <ImageSet images={col1} />

                                    </div>

                                {/* Column 2: Scrolls Down */}

                                        <ImageSet images={col2} />
                                        <ImageSet images={col2} />
                                    </div>
                                </div>

                                {/* Column 3: Scrolls Up */}
                                <div className="flex-1 overflow-hidden relative h-full">
                                    <div className="flex flex-col w-full animate-scroll-up hover:[animation-play-state:paused]" style={{ animationDuration: '40s' }}>
                                        <ImageSet images={col3} />
                                        <ImageSet images={col3} />
                                    </div>
                                </div>

                            </div>
                        </Reveal>
                    </div>
                </section>
            );
        };

        // --- TESTIMONIALS SECTION ---
        const Testimonials = () => {
            const baseFeedbacks = [

                    quote: "I had an amazing experience at the Barista Training Center! The instructors were incredibly knowledgeable, friendly, and passionate about coffee. The training was hands-on and covered everything from espresso techniques and milk frothing to latte art and customer service.",
                    name: "Aasha Subedi",
                    role: "Student",

                                            >

                                                    <div className="text-7xl text-red-500 font-serif leading-none mb-6">“</div>
                                                    <p className="text-lg md:text-xl font-medium tracking-tight leading-relaxed text-white">
                                                        {item.quote}
                                                    </p>
                                                </div>
                                                
                                                <div className="flex items-center gap-5 mt-8 border-t border-white/10 pt-8">

                                                    <div>
                                                        <h4 className="font-bold text-lg text-white leading-tight">{item.name}</h4>
                                                        <p className="text-sm text-brand-textGray font-medium mt-1">
                                                            {item.role}<br/>
                                                            <span className="opacity-70">{item.company}</span>
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        
                                    </div>
                                </div>
                            </div>
                        </Reveal>
                    </div>
                </section>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [heroLoaded, setHeroLoaded] = useState(false);
            useEffect(() => { setTimeout(() => setHeroLoaded(true), 100); }, []);

            return (
                <div className="relative min-h-screen font-sans selection:bg-brand-accent selection:text-white">
                    
                    {/* AMBIENT BACKGROUND ANIMATIONS */}
                    <div className="bg-noise"></div>
                    <div className="orb orb-1"></div>
                    <div className="orb orb-2"></div>

                    <Navbar />

                    {/* 1. CINEMATIC HERO */}

                            <p className="text-brand-accent font-bold uppercase tracking-widest text-sm mb-6">

                            <h1 className="text-[14vw] md:text-[9vw] leading-[0.85] tracking-tightest font-black uppercase text-white mb-8">

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-8 group">
                            <Reveal className="text-center" delay="0.0s">
                                <p className="font-black text-6xl md:text-8xl tracking-tighter text-outline group-hover:text-outline transition-all duration-300">20+</p>
                                <p className="text-xs font-bold uppercase tracking-widest text-brand-textGray mt-4">Batches Completed</p>
                            </Reveal>
                            <Reveal className="text-center" delay="0.1s">
                                <p className="font-black text-6xl md:text-8xl tracking-tighter text-outline group-hover:text-outline transition-all duration-300">1.2k</p>
                                <p className="text-xs font-bold uppercase tracking-widest text-brand-textGray mt-4">Students Trained</p>
                            </Reveal>
                            <Reveal className="text-center" delay="0.2s">
                                <p className="font-black text-6xl md:text-8xl tracking-tighter text-brand-accent drop-shadow-[0_0_20px_rgba(255,62,21,0.5)]">98%</p>
                                <p className="text-xs font-bold uppercase tracking-widest text-brand-textGray mt-4">Placement Rate</p>
                            </Reveal>
                            <Reveal className="text-center" delay="0.3s">

                                <p className="text-xs font-bold uppercase tracking-widest text-brand-textGray mt-4">Industry Awards</p>

                    </section>

                    {/* 7. BIG FOOTER CTA */}

</body>
