<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabica Brew | Contact Us</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../images/logo.png" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#050505',
                            dark: '#0A0A0A',
                            accent: '#FF3E15',
                            textGray: '#888888'
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        serif: ['"Georgia"', 'serif']
                    },
                    letterSpacing: {
                        tighter: '-0.04em',
                        tightest: '-0.06em'
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #050505; color: #F4F4F4; -webkit-font-smoothing: antialiased; margin: 0; overflow-x: hidden; zoom: 75%; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #FF3E15; }

        .bg-noise {
            position: fixed;
            inset: 0; /* better than top/left/width/height */
            pointer-events: none;
            z-index: 9999; /* ensure always on top */
            opacity: 0.04;

            background-image: url("data:image/svg+xml,...");
            background-repeat: repeat;
        }

        @keyframes orbFloat1 { 
            0% { transform: translate(0, 0) scale(1); } 
            33% { transform: translate(5vw, 10vh) scale(1.1); } 
            66% { transform: translate(-5vw, 5vh) scale(0.9); } 
            100% { transform: translate(0, 0) scale(1); } 
        }
        @keyframes orbFloat2 { 
            0% { transform: translate(0, 0) scale(1); } 
            50% { transform: translate(-10vw, -10vh) scale(1.2); } 
            100% { transform: translate(0, 0) scale(1); } 
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(150px); z-index: -1; opacity: 0.3; }
        .orb-1 { width: 50vw; height: 50vw; background: #FF3E15; top: -10%; left: -10%; animation: orbFloat1 20s infinite ease-in-out; }
        .orb-2 { width: 60vw; height: 60vw; background: #8B6A47; bottom: -20%; right: -10%; animation: orbFloat2 25s infinite ease-in-out; }

        .reveal-up { opacity: 0; transform: translateY(60px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-up.active { opacity: 1; transform: translateY(0); }
        
        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; box-shadow: 0 0 10px #FF3E15; }
        }
        .dot { display: inline-block; width: 0.15em; height: 0.15em; background-color: #FF3E15; border-radius: 50%; margin-left: 4px; animation: pulse-dot 2.5s infinite ease-in-out; }

        .premium-input {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1.25rem 1.5rem;
            color: #fff;
            font-size: 1.125rem;
            outline: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .premium-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 500;
            transition: all 0.4s;
        }
        .premium-input:focus {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: #FF3E15;
            box-shadow: 0 0 20px rgba(255, 62, 21, 0.15);
        }
        .premium-input:focus::placeholder {
            opacity: 0.5;
            transform: translateX(10px);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 0.8s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const useReveal = () => {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return ref;
        };

        const Reveal = ({ children, className = "", delay = "0s" }) => {
            const ref = useReveal();
            return <div ref={ref} className={`reveal-up ${className}`} style={{ transitionDelay: delay }}>{children}</div>;
        };

        const Navbar = () => (
            <nav className="absolute w-full z-50 top-0 py-6 px-8 flex justify-between items-center text-white">
                <div className="flex gap-8 text-xs uppercase tracking-widest font-semibold hidden md:flex">
                    <a href="index.html" className="hover:text-brand-accent transition-colors">Home</a>
                    <a href="course.html" className="hover:text-brand-accent transition-colors">Courses</a>
                </div>
                <div className="cursor-pointer flex items-center">
                    <img src="../images/logo.png" alt="Arabica Brew logo" className="h-32 w-auto max-h-full object-contain" />
                </div>
                <div className="flex gap-8 text-xs uppercase tracking-widest font-semibold hidden md:flex">
                    <a href="aboutus.html" className="hover:text-brand-accent transition-colors">About</a>
                    <a href="contact.html" className="hover:text-brand-accent transition-colors">Contact</a>
                </div>
            </nav>
        );

        const Toast = ({ status }) => {
            if (status === 'idle' || status === 'loading') return null;
            const isSuccess = status === 'success';
            return (
                <div className={`toast fixed bottom-8 right-8 z-[100] flex items-center gap-4 px-6 py-4 rounded-2xl shadow-2xl border ${
                    isSuccess
                        ? 'bg-[#0A0A0A] border-green-500/40 text-green-400'
                        : 'bg-[#0A0A0A] border-red-500/40 text-red-400'
                }`}>
                    <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${
                        isSuccess ? 'bg-green-500/20' : 'bg-red-500/20'
                    }`}>
                        {isSuccess
                            ? <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                            : <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        }
                    </div>
                    <div>
                        <p className="font-bold text-sm text-white">{isSuccess ? 'Message Sent!' : 'Send Failed'}</p>
                        <p className="text-xs text-white/50 mt-0.5">
                            {isSuccess ? "We'll get back to you soon." : 'Please try again later.'}
                        </p>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [heroLoaded, setHeroLoaded] = useState(false);
            const [formStatus, setFormStatus] = useState('idle'); // idle | loading | success | error
            const formRef = useRef(null);

            useEffect(() => { setTimeout(() => setHeroLoaded(true), 100); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setFormStatus('loading');
                const formData = new FormData(formRef.current);
                try {
                    const res = await fetch('https://api.web3forms.com/submit', {
                        method: 'POST',
                        body: formData,
                    });
                    const data = await res.json();
                    if (data.success) {
                        setFormStatus('success');
                        formRef.current.reset();
                        setTimeout(() => setFormStatus('idle'), 4000);
                    } else {
                        setFormStatus('error');
                        setTimeout(() => setFormStatus('idle'), 4000);
                    }
                } catch {
                    setFormStatus('error');
                    setTimeout(() => setFormStatus('idle'), 4000);
                }
            };

            return (
                <div className="relative min-h-screen font-sans selection:bg-brand-accent selection:text-white pb-0">
                    
                    <div className="bg-noise"></div>
                    <div className="orb orb-1"></div>
                    <div className="orb orb-2"></div>

                    <Navbar />
                    <Toast status={formStatus} />

                    {/* HERO */}
                    <section className="relative pt-48 pb-20 px-8 md:px-16 max-w-[1600px] mx-auto z-10 flex flex-col items-center text-center">
                        <div className={`transition-all duration-1000 delay-300 w-full max-w-4xl ${heroLoaded ? 'translate-y-0 opacity-100' : 'translate-y-20 opacity-0'}`}>
                            <h1 className="text-[14vw] md:text-[9vw] leading-[0.85] tracking-tightest font-black uppercase text-white mb-8">
                                Contact Us<span className="dot"></span>
                            </h1>
                            <p className="text-xl md:text-2xl font-bold text-white leading-tight mb-4">
                                Start your coffee journey with us—brew excellence, master your craft!
                            </p>
                            <p className="text-lg md:text-xl font-medium text-brand-textGray leading-relaxed max-w-2xl mx-auto mb-10">
                                Discover the rich aromas, bold flavors, and timeless rituals that make every cup extraordinary.
                            </p>
                        </div>
                        <div className="absolute bottom-[-30px] text-brand-textGray text-xs uppercase tracking-widest font-semibold flex flex-col items-center gap-4">
                            <span>Scroll</span>
                            <div className="w-[1px] h-16 bg-gradient-to-b from-brand-textGray to-transparent"></div>
                        </div>
                    </section>

                    {/* CONTACT CARDS */}
                    <section className="py-16 px-8 md:px-16 max-w-[1400px] mx-auto relative z-10">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <Reveal delay="0.1s" className="bg-white/5 border border-white/10 rounded-[2rem] p-10 hover:bg-white/10 hover:-translate-y-2 transition-all duration-500 flex flex-col items-center text-center group">
                                <div className="w-16 h-16 rounded-full bg-brand-dark border border-white/10 flex items-center justify-center text-brand-accent mb-6 group-hover:bg-brand-accent group-hover:text-white transition-colors duration-500 shadow-lg">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                </div>
                                <h3 className="text-xs font-bold uppercase tracking-widest text-brand-textGray mb-3 group-hover:text-white transition-colors">Location</h3>
                                <p className="text-white font-bold text-lg leading-snug">Devasthal Marga,<br/>Kathmandu Chowk 44600</p>
                            </Reveal>
                            <Reveal delay="0.2s" className="bg-white/5 border border-white/10 rounded-[2rem] p-10 hover:bg-white/10 hover:-translate-y-2 transition-all duration-500 flex flex-col items-center text-center group">
                                <div className="w-16 h-16 rounded-full bg-brand-dark border border-white/10 flex items-center justify-center text-brand-accent mb-6 group-hover:bg-brand-accent group-hover:text-white transition-colors duration-500 shadow-lg">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                                </div>
                                <h3 className="text-xs font-bold uppercase tracking-widest text-brand-textGray mb-3 group-hover:text-white transition-colors">Phone</h3>
                                <p className="text-white font-bold text-lg leading-snug">+977 9865991279<br/>+977 9861197332</p>
                            </Reveal>
                            <Reveal delay="0.3s" className="bg-white/5 border border-white/10 rounded-[2rem] p-10 hover:bg-white/10 hover:-translate-y-2 transition-all duration-500 flex flex-col items-center text-center group">
                                <div className="w-16 h-16 rounded-full bg-brand-dark border border-white/10 flex items-center justify-center text-brand-accent mb-6 group-hover:bg-brand-accent group-hover:text-white transition-colors duration-500 shadow-lg">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                                </div>
                                <h3 className="text-xs font-bold uppercase tracking-widest text-brand-textGray mb-3 group-hover:text-white transition-colors">Email</h3>
                                <p className="text-white font-bold text-lg leading-snug break-all">arabicabrewcoffee5<br/>@gmail.com</p>
                            </Reveal>
                        </div>
                    </section>

                    {/* FORM */}
                    <section className="py-24 px-8 md:px-16 max-w-[1600px] mx-auto relative z-10">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-16 lg:gap-24 items-center">
                            <div className="lg:col-span-5">
                                <Reveal>
                                    <h2 className="text-5xl md:text-7xl font-black tracking-tighter leading-[0.9] text-white mb-8">
                                        Get In Touch<span className="dot"></span>
                                    </h2>
                                    <p className="text-brand-textGray text-xl font-medium leading-relaxed">
                                        Reach out to us and begin your journey in the art of coffee making. Together, we'll guide you through every step to brew excellence and elevate your skills to the next level!
                                    </p>
                                </Reveal>
                            </div>

                            <div className="lg:col-span-7 relative">
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3/4 h-3/4 bg-brand-accent/20 blur-[100px] rounded-full -z-10 pointer-events-none"></div>
                                <Reveal delay="0.2s">
                                    <div className="bg-[#0A0A0A] border border-white/10 rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
                                        <form ref={formRef} onSubmit={handleSubmit} className="flex flex-col gap-6">

                                            {/* Web3Forms hidden fields */}
                                            <input type="hidden" name="access_key" value="a47a9f40-09a7-495b-bd93-b2ea7fef3baf" />
                                            <input type="hidden" name="subject" value="New Contact Form Submission – Arabica Brew" />
                                            {/* Honeypot spam protection */}
                                            <input type="checkbox" name="botcheck" className="hidden" style={{display:'none'}} />

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div className="flex flex-col gap-2">
                                                    <label className="text-xs font-bold tracking-widest uppercase text-brand-textGray ml-2">Name</label>
                                                    <input type="text" name="name" placeholder="John Doe" required className="premium-input" />
                                                </div>
                                                <div className="flex flex-col gap-2">
                                                    <label className="text-xs font-bold tracking-widest uppercase text-brand-textGray ml-2">Email</label>
                                                    <input type="email" name="email" placeholder="john@example.com" required className="premium-input" />
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div className="flex flex-col gap-2">
                                                    <label className="text-xs font-bold tracking-widest uppercase text-brand-textGray ml-2">Phone No</label>
                                                    <input type="tel" name="phone" placeholder="+977..." className="premium-input" />
                                                </div>
                                                <div className="flex flex-col gap-2">
                                                    <label className="text-xs font-bold tracking-widest uppercase text-brand-textGray ml-2">Subject</label>
                                                    <input type="text" name="inquiry_subject" placeholder="How can we help?" className="premium-input" />
                                                </div>
                                            </div>

                                            <div className="flex flex-col gap-2">
                                                <label className="text-xs font-bold tracking-widest uppercase text-brand-textGray ml-2">Write something</label>
                                                <textarea name="message" rows="4" placeholder="Write message..." required className="premium-input resize-none"></textarea>
                                            </div>

                                            <div className="mt-6 flex justify-end">
                                                <button
                                                    type="submit"
                                                    disabled={formStatus === 'loading'}
                                                    className="bg-brand-accent text-white px-12 py-5 rounded-full text-sm font-bold tracking-widest uppercase hover:bg-white hover:text-brand-dark transition-all duration-500 shadow-[0_0_20px_rgba(255,62,21,0.3)] hover:shadow-[0_0_40px_rgba(255,255,255,0.4)] hover:-translate-y-1 w-full md:w-auto disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:translate-y-0 flex items-center justify-center gap-3"
                                                >
                                                    {formStatus === 'loading' ? (
                                                        <>
                                                            <svg className="spinner w-4 h-4" fill="none" viewBox="0 0 24 24">
                                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                                                            </svg>
                                                            Sending…
                                                        </>
                                                    ) : 'Send Message'}
                                                </button>
                                            </div>
                                        </form>
                                    </div>
                                </Reveal>
                            </div>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="text-white pt-32 pb-10 px-8 md:px-16 flex flex-col justify-between relative z-10 bg-brand-bg/80 backdrop-blur-xl border-t border-white/10 mt-16">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-12 border-t border-white/20 pt-12 max-w-[1600px] mx-auto w-full">
                            <div className="col-span-1 md:col-span-2">
                                <img src="../images/logo.png" alt="Arabica Brew logo" className="h-32 w-auto max-h-full object-contain mb-4" />
                                <p className="text-brand-textGray text-sm font-medium max-w-sm">The premier coffee school dedicated to cultivating a new generation of skilled baristas.</p>
                            </div>
                            <div>
                                <h3 className="font-bold text-xs uppercase tracking-widest mb-6 text-white/50">Office</h3>
                                <p className="font-medium text-sm mb-2 text-brand-textGray">Devasthal Marga, Kathmandu</p>
                                <p className="font-medium text-sm mb-4 text-brand-textGray">Koteshwor Chowk 44600</p>
                                <a className="font-medium text-sm hover:text-brand-accent transition-colors block mb-2">arabicabrewcoffee5@gmail.com</a>
                                <p className="font-medium text-sm">+977 9865991279</p>
                            </div>
                            <div>
                                <h3 className="font-bold text-xs uppercase tracking-widest mb-6 text-white/50">Social</h3>
                                <div className="flex flex-col gap-3 font-medium text-sm">
                                    <a href="https://www.instagram.com/arabica_brew_coffee_school/" className="hover:text-brand-accent transition-colors" target="_blank" rel="noopener noreferrer">Instagram</a>
                                    <a href="https://www.facebook.com/arabika.bru.kaphi.skula" className="hover:text-brand-accent transition-colors" target="_blank" rel="noopener noreferrer">Facebook</a>
                                    <a href="https://www.tiktok.com/@arabicabrewcoffeeschool" className="hover:text-brand-accent transition-colors" target="_blank" rel="noopener noreferrer">Tiktok</a>
                                    <a href="https://www.youtube.com/@ArabicaBrewCoffeeSchool/videos" className="hover:text-brand-accent transition-colors" target="_blank" rel="noopener noreferrer">YouTube</a>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
