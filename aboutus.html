<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabica Brew | About Us</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../images/logo.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#050505',
                            dark: '#0A0A0A',
                            accent: '#FF3E15',
                            textGray: '#888888'
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        serif: ['"Georgia"', 'serif']
                    },
                    letterSpacing: {
                        tighter: '-0.04em',
                        tightest: '-0.06em'
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #050505;
            color: #F4F4F4;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            overflow-x: hidden;
            zoom: 75%;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #FF3E15;
        }

        .bg-noise {
            position: fixed;
            inset: 0; /* better than top/left/width/height */
            pointer-events: none;
            z-index: 9999; /* ensure always on top */
            opacity: 0.04;

            background-image: url("data:image/svg+xml,...");
            background-repeat: repeat;
        }

        @keyframes orbFloat1 {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(5vw, 10vh) scale(1.1);
            }

            66% {
                transform: translate(-5vw, 5vh) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        @keyframes orbFloat2 {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(-10vw, -10vh) scale(1.2);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.3;
        }

        .orb-1 {
            width: 50vw;
            height: 50vw;
            background: #FF3E15;
            top: -10%;
            left: -10%;
            animation: orbFloat1 20s infinite ease-in-out;
        }

        .orb-2 {
            width: 60vw;
            height: 60vw;
            background: #8B6A47;
            bottom: -20%;
            right: -10%;
            animation: orbFloat2 25s infinite ease-in-out;
        }

        .reveal-up {
            opacity: 0;
            transform: translateY(80px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal-up.active {
            opacity: 1;
            transform: translateY(0);
        }

        .dot {
            display: inline-block;
            width: 0.15em;
            height: 0.15em;
            background-color: #FF3E15;
            border-radius: 50%;
            margin-left: 2px;
        }

        @keyframes scroll-left {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(calc(-50% - 12px));
            }
        }

        .animate-scroll-left {
            animation: scroll-left 40s linear infinite;
        }

        .mask-edges {
            -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%);
            mask-image: linear-gradient(to right, black 80%, transparent 100%);
        }

        .mask-vertical {
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
        }

        @keyframes scroll-up {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-50%);
            }
        }

        @keyframes scroll-down {
            0% {
                transform: translateY(-50%);
            }

            100% {
                transform: translateY(0);
            }
        }

        .animate-scroll-up {
            animation: scroll-up 35s linear infinite;
        }

        .animate-scroll-down {
            animation: scroll-down 40s linear infinite;
        }

        .text-outline {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2);
            color: transparent;
            transition: all 0.5s ease;
        }

        .group:hover .text-outline {
            -webkit-text-stroke: 1px #FF3E15;
            color: #FF3E15;
        }

        .smooth-hover {
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const useReveal = () => {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return ref;
        };

        const Reveal = ({ children, className = "", delay = "0s" }) => {
            const ref = useReveal();
            return <div ref={ref} className={`reveal-up ${className}`} style={{ transitionDelay: delay }}>{children}</div>;
        };

        const Navbar = () => (
            <nav className="absolute w-full z-50 top-0 py-6 px-8 flex justify-between items-center text-white">
                <div className="flex gap-8 text-xs uppercase tracking-widest font-semibold hidden md:flex">
                    <a href="home.html" className="hover:text-brand-accent transition-colors">Home</a>
                    <a href="course.html" className="hover:text-brand-accent transition-colors">Courses</a>
                </div>
                <div className="cursor-pointer flex items-center">
                    <img src="../images/logo.png" alt="Arabica Brew logo" className="h-32 w-auto max-h-full object-contain" />
                </div>
                <div className="flex gap-8 text-xs uppercase tracking-widest font-semibold hidden md:flex">
                    <a href="#" className="hover:text-brand-accent transition-colors">About</a>
                    <a href="contact.html" className="hover:text-brand-accent transition-colors">Contact</a>
                </div>
            </nav>
        );

        const AnimatedVerticalGallery = () => {
            const col1 = [
                { url: "../images/1.jpg", height: "h-[300px]" },
                { url: "../images/2.jpg", height: "h-[450px]" },
                { url: "../images/3.jpg", height: "h-[250px]" },
                { url: "../images/4.jpg", height: "h-[350px]" },
                { url: "../images/5.jpg", height: "h-[280px]" }
            ];
            const col2 = [
                { url: "../images/6.jpg", height: "h-[400px]" },
                { url: "../images/7.jpg", height: "h-[250px]" },
                { url: "../images/8.jpg", height: "h-[350px]" },
                { url: "../images/9.jpg", height: "h-[450px]" },
                { url: "../images/10.jpg", height: "h-[300px]" }
            ];
            const col3 = [
                { url: "../images/11.jpg", height: "h-[300px]" },
                { url: "../images/12.jpg", height: "h-[400px]" },
                { url: "../images/13.jpg", height: "h-[450px]" },
                { url: "../images/14.jpg", height: "h-[250px]" },
                { url: "../images/15.jpg", height: "h-[350px]" }
            ];

            const ImageSet = ({ images }) => (
                <div className="flex flex-col gap-4 md:gap-6 w-full pb-4 md:pb-6">
                    {images.map((img, i) => (
                        <div key={i} className={`relative w-full ${img.height} rounded-[1.5rem] overflow-hidden bg-brand-dark group border border-white/10 shrink-0 cursor-pointer`}>
                            <img src={img.url} alt="Gallery image" className="w-full h-full object-cover transition-transform duration-[800ms] group-hover:scale-110 grayscale-[30%] group-hover:grayscale-0" />
                            <div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-500"></div>
                        </div>
                    ))}
                </div>
            );

            return (
                <section className="py-5 relative z-10 overflow-hidden">
                    <div className="px-8 md:px-16 max-w-[1600px] mx-auto mb-16 flex flex-col md:flex-row md:items-end justify-between gap-8">
                        <Reveal>
                            <h2 className="text-5xl md:text-7xl font-black tracking-tighter leading-[0.9] text-white text-center">
                                The Craft in Motion<span className="dot"></span>
                            </h2>
                        </Reveal>
                        <Reveal delay="0.2s">
                            <div className="flex items-center gap-4 text-brand-textGray uppercase tracking-widest text-xs font-bold">
                                <span>Gallery</span>
                                <div className="w-12 h-[1px] bg-brand-textGray"></div>
                                <span>↓</span>
                            </div>
                        </Reveal>
                    </div>

                    <div className="px-4 md:px-16 max-w-[1600px] mx-auto h-[60vh] md:h-[80vh] mask-vertical overflow-hidden">
                        <Reveal delay="0.3s" className="h-full">
                            <div className="flex gap-4 md:gap-6 h-full w-full justify-center">

                                {/* Column 1: Scrolls Up */}
                                <div className="flex-1 overflow-hidden relative h-full">
                                    <div className="flex flex-col w-full animate-scroll-up hover:[animation-play-state:paused]" style={{ animationDuration: '35s' }}>
                                        <ImageSet images={col1} />
                                        <ImageSet images={col1} />
                                    </div>
                                </div>

                                {/* Column 2: Scrolls Down */}
                                <div className="flex-1 overflow-hidden relative h-full">
                                    <div className="flex flex-col w-full animate-scroll-down hover:[animation-play-state:paused]" style={{ animationDuration: '45s' }}>
                                        <ImageSet images={col2} />
                                        <ImageSet images={col2} />
                                    </div>
                                </div>

                                {/* Column 3: Scrolls Up */}
                                <div className="flex-1 overflow-hidden relative h-full">
                                    <div className="flex flex-col w-full animate-scroll-up hover:[animation-play-state:paused]" style={{ animationDuration: '40s' }}>
                                        <ImageSet images={col3} />
                                        <ImageSet images={col3} />
                                    </div>
                                </div>

                            </div>
                        </Reveal>
                    </div>
                </section>
            );
        };

        const App = () => {
            const [heroLoaded, setHeroLoaded] = useState(false);
            useEffect(() => { setTimeout(() => setHeroLoaded(true), 100); }, []);

            const features = [
                { title: "Expert Trainers", desc: "Led by Barista Trainer Sanish Shrestha and supported by our experienced team." },
                { title: "Comprehensive Curriculum", desc: "From beginner to advanced, our courses cover every aspect of coffee craftsmanship." },
                { title: "Hands-On Learning", desc: "Gain practical skills with state-of-the-art equipment and real-world scenarios." },
                { title: "Community", desc: "Be part of a vibrant coffee culture and network with fellow enthusiasts." }
            ];

            const extraFeatures = [
                "Freshly roasted coffee beans for sale.",
                "Bubble tea-making workshops.",
                "Tailored classes for international job readiness."
            ];

            return (
                <div className="relative min-h-screen font-sans selection:bg-brand-accent selection:text-white">

                    <div className="bg-noise"></div>
                    <div className="orb orb-1"></div>
                    <div className="orb orb-2"></div>

                    <Navbar />

                    {/* HERO */}
                    <section className="relative h-screen flex flex-col justify-center items-center overflow-hidden px-4 z-10 pt-40">
                        <div className={`z-10 transition-all duration-1000 delay-300 ${heroLoaded ? 'translate-y-0 opacity-100' : 'translate-y-20 opacity-0'}`}>
                            <h1 className="text-[14vw] md:text-[10vw] leading-[0.85] tracking-tightest font-black uppercase text-white mb-8">
                                Who We Are<span className="text-brand-accent">.</span>
                            </h1>
                            <p className="text-xl md:text-2xl font-medium text-white max-w-3xl mb-2 leading-relaxed center">
                                Start your coffee journey with Arabica Brew Coffee School—where every sip tells a story!
                            </p>
                        </div>

                        <div className="absolute bottom-[20px] text-brand-textGray text-xs uppercase tracking-widest font-semibold flex flex-col items-center gap-4">
                            <span>Scroll</span>
                            <div className="w-[1px] h-16 bg-gradient-to-b from-brand-textGray to-transparent"></div>
                        </div>
                    </section>

                    {/* 3. ABOUT US TEXT CONTENT */}
                    <section className="py-32 px-8 md:px-16 max-w-[1600px] mx-auto relative z-10">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-16">
                            <div className="lg:col-span-5">
                                <Reveal>
                                    <h2 className="text-5xl md:text-7xl font-black tracking-tighter leading-[0.9] text-white sticky top-32">
                                        About Us<span className="dot"></span>
                                    </h2>
                                </Reveal>
                                <Reveal delay="0.1s">
                                    <img src="../images/about.gif" alt="About Us" className="w-full rounded-[1.5rem] mt-16 scale-125 ml-[-2rem]" />
                                </Reveal>
                            </div>
                            <div className="lg:col-span-7 flex flex-col gap-8 text-xl text-brand-textGray font-medium leading-relaxed">
                                <Reveal delay="0.1s">
                                    <p className="text-white text-2xl md:text-3xl font-semibold leading-tight mb-4">
                                        At Arabica Brew Coffee School, we blend passion, craftsmanship, and expertise to bring you the finest coffee education and experiences.
                                    </p>
                                    <p>
                                        Whether you’re a coffee enthusiast, an aspiring barista, or a professional seeking to elevate your skills, our comprehensive training programs are tailored to meet your goals.
                                    </p>
                                </Reveal>
                                <Reveal delay="0.2s">
                                    <p>
                                        It is dedicated to cultivating a new generation of skilled baristas and coffee enthusiasts. We offer expert-led training that combines hands-on practice with in-depth knowledge of coffee culture, brewing techniques, and customer service.
                                    </p>
                                    <p className="mt-6">
                                        Whether you're just starting or looking to enhance your skills, we provide the tools and guidance you need to excel in the coffee industry.
                                    </p>
                                </Reveal>
                                <Reveal delay="0.3s" className="mt-8">
                                    <a href="contact.html" className="border border-white/30 text-white px-10 py-5 rounded-full text-sm font-bold tracking-widest uppercase hover:bg-white hover:text-brand-dark transition-colors">
                                        Get in Touch
                                    </a>
                                </Reveal>
                            </div>
                        </div>
                    </section>

                    {/* GALLERY */}
                    <AnimatedVerticalGallery />

                    {/* 4. WHY CHOOSE US (BENTO GRID) */}
                    <section className="py-32 px-8 md:px-16 max-w-[1600px] mx-auto relative z-10 border-t border-white/10">
                        <Reveal>
                            <h2 className="text-5xl md:text-7xl font-black tracking-tighter leading-[0.9] text-white mb-16 text-center">
                                Why Choose Us<span className="dot"></span>
                            </h2>
                        </Reveal>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            {features.map((feature, idx) => (
                                <Reveal key={idx} delay={`${idx * 0.1}s`} className="bg-white/5 border border-white/10 p-10 rounded-[2rem] hover:bg-white/10 transition-colors group">
                                    <div className="text-brand-accent font-serif text-5xl mb-6 opacity-50 group-hover:opacity-100 transition-opacity">
                                        0{idx + 1}
                                    </div>
                                    <h3 className="text-2xl font-bold text-white mb-4 tracking-tight">{feature.title}</h3>
                                    <p className="text-brand-textGray font-medium leading-relaxed">{feature.desc}</p>
                                </Reveal>
                            ))}

                            {/* Wide card for extra features */}
                            <Reveal delay="0.4s" className="md:col-span-2 lg:col-span-4 bg-brand-accent p-10 md:p-16 rounded-[2rem] flex flex-col md:flex-row items-center justify-between gap-8 mt-4 text-white">
                                <h3 className="text-3xl md:text-5xl font-black tracking-tighter uppercase w-full md:w-1/3 leading-tight">
                                    More than just coffee.
                                </h3>
                                <div className="w-full md:w-2/3 flex flex-col gap-4 font-bold text-lg md:text-xl">
                                    {extraFeatures.map((item, idx) => (
                                        <div key={idx} className="group flex items-center gap-4 border-b border-black/10 pb-4 last:border-0 last:pb-0">
                                            <div className="w-3 h-3 bg-white group-hover:bg-black rounded-full shrink-0 transition-colors"></div>
                                            <p className="text-white group-hover:text-black transition-colors">{item}</p>
                                        </div>
                                    ))}
                                </div>
                            </Reveal>
                        </div>
                    </section>

                    {/* FOOTER CTA */}
                    <footer className="text-white pt-10 pb-10 px-8 md:px-10 flex flex-col justify-between relative z-10 bg-brand-bg/80 backdrop-blur-xl border-t border-white/10">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-12 border-t border-white/20 pt-12 max-w-[1600px] mx-auto w-full">
                            <div className="col-span-1 md:col-span-2">
                                <img src="../images/logo.png" alt="Arabica Brew logo" className="h-32 w-auto max-h-full object-contain mb-4" />
                                <p className="text-brand-textGray text-sm font-medium max-w-sm">The premier coffee school dedicated to cultivating a new generation of skilled baristas.</p>
                            </div>
                            <div>
                                <h3 className="font-bold text-xs uppercase tracking-widest mb-6 text-white/50">Office</h3>
                                <p className="font-medium text-sm mb-2 text-brand-textGray">Devasthal Marga, Kathmandu</p>
                                <p className="font-medium text-sm mb-4 text-brand-textGray">Koteshwor Chowk 44600</p>
                                <a className="font-medium text-sm hover:text-brand-accent transition-colors block mb-2">arabicabrewcoffee5@gmail.com</a>
                                <p className="font-medium text-sm">+977 9865991279</p>
                            </div>
                            <div>
                                <h3 className="font-bold text-xs uppercase tracking-widest mb-6 text-white/50">Social</h3>
                                <div className="flex flex-col gap-3 font-medium text-sm">
                                    <a href="https://www.instagram.com/arabica_brew_coffee_school/" className="hover:text-brand-accent transition-colors" target="_blank" rel="noopener noreferrer">Instagram</a>
                                    <a href="https://www.facebook.com/arabika.bru.kaphi.skula" className="hover:text-brand-accent transition-colors" target="_blank" rel="noopener noreferrer">Facebook</a>
                                    <a href="https://www.tiktok.com/@arabicabrewcoffeeschool" className="hover:text-brand-accent transition-colors" target="_blank" rel="noopener noreferrer">Tiktok</a>
                                    <a href="https://www.youtube.com/@ArabicaBrewCoffeeSchool/videos" className="hover:text-brand-accent transition-colors" target="_blank" rel="noopener noreferrer">YouTube</a>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
